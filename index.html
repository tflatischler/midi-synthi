<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI SYNTHI — Workstation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080f;--sf:#101020;--sf2:#181830;--brd:#252540;
  --txt:#d0d0e8;--dim:#555578;
  --cyan:#00e5ff;--cyan-g:rgba(0,229,255,.25);
  --pink:#ff2d75;--pink-g:rgba(255,45,117,.25);
  --purple:#b44dff;--purple-g:rgba(180,77,255,.25);
  --green:#00ff88;--green-g:rgba(0,255,136,.25);
  --orange:#ff8c00;--orange-g:rgba(255,140,0,.25);
  --yellow:#ffe600;--yellow-g:rgba(255,230,0,.25);
  --red:#ff4444;--red-g:rgba(255,68,68,.25);
}
body{background:var(--bg);color:var(--txt);font-family:'Share Tech Mono',monospace;min-height:100vh}
.app{max-width:1280px;margin:0 auto;padding:12px}

/* Header */
header{text-align:center;padding:16px 0 10px}
header h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2rem;letter-spacing:.25em;
  background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px var(--cyan-g))}
header .sub{font-size:.65rem;color:var(--dim);letter-spacing:.4em;margin-top:2px}

/* Transport */
.transport{display:flex;flex-wrap:wrap;gap:12px;padding:14px 16px;background:var(--sf);
  border:1px solid var(--brd);border-radius:10px;margin-bottom:12px;align-items:flex-end}
.tg{display:flex;flex-direction:column;gap:3px}
.tg label{font-size:.6rem;color:var(--dim);letter-spacing:.12em;text-transform:uppercase}
.tg-row{display:flex;gap:6px}
.btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:.65rem;padding:8px 14px;
  border:2px solid var(--brd);border-radius:6px;background:var(--sf2);color:var(--txt);
  cursor:pointer;transition:all .12s;letter-spacing:.08em;text-transform:uppercase}
.btn:hover{border-color:var(--cyan);box-shadow:0 0 10px var(--cyan-g)}
.btn.on{background:var(--cyan);color:var(--bg);border-color:var(--cyan);box-shadow:0 0 16px var(--cyan-g)}
.btn.rec-on{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 16px var(--red-g);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.btn.stop:hover{border-color:var(--pink);box-shadow:0 0 10px var(--pink-g)}
.sep{width:1px;background:var(--brd);align-self:stretch;margin:0 2px}
input[type=range]{-webkit-appearance:none;appearance:none;width:90px;height:5px;border-radius:3px;
  background:var(--sf2);outline:none;border:1px solid var(--brd)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--cyan);cursor:pointer;box-shadow:0 0 6px var(--cyan-g)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--cyan);
  cursor:pointer;border:none;box-shadow:0 0 6px var(--cyan-g)}
.rv{font-size:.6rem;color:var(--cyan);font-family:'Orbitron',sans-serif;min-width:36px;text-align:center}
select{font-family:'Share Tech Mono',monospace;font-size:.75rem;padding:6px 10px;background:var(--sf2);
  color:var(--txt);border:2px solid var(--brd);border-radius:6px;cursor:pointer;outline:none}
select:focus{border-color:var(--cyan)}

/* Section */
.section{background:var(--sf);border:1px solid var(--brd);border-radius:10px;margin-bottom:12px;overflow:hidden}
.section-head{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--brd);cursor:pointer;user-select:none}
.section-head h2{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.15em}
.section-head .badge{font-size:.55rem;padding:2px 8px;border-radius:4px;font-family:'Orbitron',sans-serif;font-weight:700}
.section-body{padding:12px 14px;overflow-x:auto}
.section.collapsed .section-body{display:none}
.section-controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;align-items:flex-end}

/* Grid */
.grid{display:grid;gap:2px;min-width:680px}
.grid .lbl{display:flex;align-items:center;gap:4px;min-width:90px;white-space:nowrap}
.grid .lbl-name{font-family:'Orbitron',sans-serif;font-size:.55rem;font-weight:700;min-width:42px;text-align:right}
.grid .lbl-vol{width:40px;height:4px}
.grid .lbl-mute{font-size:.5rem;padding:2px 4px;border:1px solid var(--brd);border-radius:3px;
  background:var(--sf2);color:var(--dim);cursor:pointer;font-family:'Orbitron',sans-serif}
.grid .lbl-mute.on{background:var(--red);color:#fff;border-color:var(--red)}
.step-num{text-align:center;font-size:.5rem;color:var(--dim);font-family:'Orbitron',sans-serif;padding-bottom:2px}
.cell{width:100%;aspect-ratio:1;min-width:24px;max-width:42px;border-radius:3px;border:1px solid var(--brd);
  background:var(--bg);cursor:pointer;transition:all .08s}
.cell:hover{border-color:#444;background:#12122a}
.cell.on{border-color:transparent}
.cell.head{background:rgba(255,255,255,.06)!important}
.cell.head.on{filter:brightness(1.4);box-shadow:0 0 12px var(--cyan-g)}
.cell[data-beat="0"]{border-left:2px solid #333}

/* Drum colors */
.drum-section .cell.on{background:var(--orange);box-shadow:0 0 8px var(--orange-g)}
.drum-section .lbl-name{color:var(--orange)}

/* Synth colors by octave */
.cell.on[data-oct="hi"]{background:var(--pink);box-shadow:0 0 8px var(--pink-g)}
.cell.on[data-oct="mid"]{background:var(--cyan);box-shadow:0 0 8px var(--cyan-g)}
.cell.on[data-oct="lo"]{background:var(--purple);box-shadow:0 0 8px var(--purple-g)}
.cell.on[data-oct="sub"]{background:var(--green);box-shadow:0 0 8px var(--green-g)}
[data-oct="hi"]{color:var(--pink)}[data-oct="mid"]{color:var(--cyan)}
[data-oct="lo"]{color:var(--purple)}[data-oct="sub"]{color:var(--green)}

/* Sampler colors */
.sampler-section .cell.on{background:var(--yellow);box-shadow:0 0 8px var(--yellow-g)}
.sampler-section .lbl-name{color:var(--yellow)}

/* Sampler controls */
.smp-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.smp-slot{display:flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid var(--brd);
  border-radius:6px;background:var(--sf2);font-size:.65rem}
.smp-slot.has-sample{border-color:var(--yellow)}
.smp-slot .smp-name{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--yellow)}
.smp-del{cursor:pointer;color:var(--dim);font-size:.7rem}
.smp-del:hover{color:var(--red)}

/* Visualizer */
.vis{height:80px;position:relative;overflow:hidden}
canvas{width:100%;height:100%;display:block}

/* Patterns */
.patterns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pat-btn{font-family:'Orbitron',sans-serif;font-size:.6rem;padding:5px 12px;border:1px solid var(--brd);
  border-radius:5px;background:var(--sf);color:var(--dim);cursor:pointer;transition:all .12s}
.pat-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.pat-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.06)}
.pat-btn.has-data{color:var(--txt)}

footer{text-align:center;padding:12px 0;font-size:.55rem;color:var(--dim)}

@media(max-width:768px){
  header h1{font-size:1.3rem}
  .transport{gap:8px;padding:10px}
  input[type=range]{width:70px}
  .cell{min-width:20px}
}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>MIDI SYNTHI</h1>
  <div class="sub">WORKSTATION &mdash; DRUMS &bull; SYNTH &bull; SAMPLER</div>
</header>

<!-- Transport -->
<div class="transport">
  <div class="tg"><label>Transport</label>
    <div class="tg-row">
      <button class="btn" id="playBtn">&#9654; Play</button>
      <button class="btn stop" id="stopBtn">&#9632; Stop</button>
    </div>
  </div>
  <div class="sep"></div>
  <div class="tg"><label>Tempo</label>
    <input type="range" id="bpm" min="40" max="240" value="120">
    <span class="rv" id="bpmV">120</span>
  </div>
  <div class="tg"><label>Swing</label>
    <input type="range" id="swing" min="0" max="80" value="0">
    <span class="rv" id="swingV">0%</span>
  </div>
  <div class="sep"></div>
  <div class="tg"><label>Master</label>
    <input type="range" id="masterVol" min="0" max="100" value="75">
    <span class="rv" id="masterV">75%</span>
  </div>
  <div class="sep"></div>
  <div class="tg"><label>Pattern</label>
    <div class="tg-row">
      <button class="btn" id="saveBtn">Save</button>
      <button class="btn" id="loadBtn">Load</button>
      <button class="btn stop" id="clearAllBtn">Clear</button>
    </div>
  </div>
</div>

<!-- Pattern slots -->
<div class="patterns" id="patterns"></div>

<!-- DRUMS -->
<div class="section drum-section" id="drumSection">
  <div class="section-head" onclick="toggleSection('drumSection')">
    <span class="badge" style="background:var(--orange-g);color:var(--orange)">DR</span>
    <h2>DRUMS</h2>
  </div>
  <div class="section-body">
    <div class="grid" id="drumGrid"></div>
  </div>
</div>

<!-- SYNTH -->
<div class="section synth-section" id="synthSection">
  <div class="section-head" onclick="toggleSection('synthSection')">
    <span class="badge" style="background:var(--cyan-g);color:var(--cyan)">SY</span>
    <h2>SYNTH</h2>
  </div>
  <div class="section-body">
    <div class="section-controls">
      <div class="tg"><label>Wave</label>
        <select id="synthWave">
          <option value="sawtooth">Sawtooth</option>
          <option value="square">Square</option>
          <option value="sine">Sine</option>
          <option value="triangle">Triangle</option>
        </select>
      </div>
      <div class="tg"><label>Filter</label>
        <input type="range" id="synthFilter" min="100" max="8000" value="3000">
        <span class="rv" id="synthFilterV">3000</span>
      </div>
      <div class="tg"><label>Reso</label>
        <input type="range" id="synthQ" min="0" max="20" value="1" step=".5">
        <span class="rv" id="synthQV">1.0</span>
      </div>
      <div class="tg"><label>Attack</label>
        <input type="range" id="synthAtk" min="0" max="500" value="10">
        <span class="rv" id="synthAtkV">10</span>
      </div>
      <div class="tg"><label>Decay</label>
        <input type="range" id="synthDec" min="10" max="1000" value="200">
        <span class="rv" id="synthDecV">200</span>
      </div>
      <div class="tg"><label>Sustain</label>
        <input type="range" id="synthSus" min="0" max="100" value="30">
        <span class="rv" id="synthSusV">30%</span>
      </div>
      <div class="tg"><label>Release</label>
        <input type="range" id="synthRel" min="10" max="2000" value="300">
        <span class="rv" id="synthRelV">300</span>
      </div>
      <div class="tg"><label>Delay</label>
        <input type="range" id="synthDelay" min="0" max="80" value="0">
        <span class="rv" id="synthDelayV">0%</span>
      </div>
      <div class="sep"></div>
      <div class="tg"><label>Preset</label>
        <select id="synthPreset">
          <option value="">-- Select --</option>
          <option value="lead">Lead</option>
          <option value="bass">Bass</option>
          <option value="pad">Pad</option>
          <option value="pluck">Pluck</option>
          <option value="acid">Acid</option>
          <option value="sub">Sub Bass</option>
        </select>
      </div>
    </div>
    <div class="grid" id="synthGrid"></div>
  </div>
</div>

<!-- SAMPLER -->
<div class="section sampler-section" id="samplerSection">
  <div class="section-head" onclick="toggleSection('samplerSection')">
    <span class="badge" style="background:var(--yellow-g);color:var(--yellow)">SM</span>
    <h2>SAMPLER</h2>
  </div>
  <div class="section-body">
    <div class="smp-controls" id="smpControls">
      <button class="btn" id="recBtn" onclick="toggleRecording()">&#9679; Rec</button>
      <label class="btn" style="cursor:pointer">
        &#128193; Load
        <input type="file" accept="audio/*" multiple id="fileInput" style="display:none" onchange="handleFiles(event)">
      </label>
      <div id="smpSlots" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div class="grid" id="samplerGrid" style="margin-top:10px"></div>
  </div>
</div>

<!-- Visualizer -->
<div class="section">
  <div class="section-body vis">
    <canvas id="visCanvas"></canvas>
  </div>
</div>

<footer>MIDI SYNTHI WORKSTATION &mdash; Web Audio API &bull; No Dependencies</footer>
</div>

<script>
// ─── CONFIG ───
const STEPS = 16;

const DRUMS = [
  { name: 'Kick', key: 'kick' },
  { name: 'Snare', key: 'snare' },
  { name: 'Cl HH', key: 'chh' },
  { name: 'Op HH', key: 'ohh' },
  { name: 'Clap', key: 'clap' },
  { name: 'Tom L', key: 'tomL' },
  { name: 'Tom H', key: 'tomH' },
  { name: 'Rim', key: 'rim' },
];

const SYNTH_NOTES = [
  { name:'C5',  freq:523.25, oct:'hi' },
  { name:'Bb4', freq:466.16, oct:'hi' },
  { name:'G4',  freq:392.00, oct:'hi' },
  { name:'F4',  freq:349.23, oct:'mid' },
  { name:'Eb4', freq:311.13, oct:'mid' },
  { name:'C4',  freq:261.63, oct:'mid' },
  { name:'Bb3', freq:233.08, oct:'lo' },
  { name:'G3',  freq:196.00, oct:'lo' },
  { name:'F3',  freq:174.61, oct:'lo' },
  { name:'Eb3', freq:155.56, oct:'sub' },
  { name:'C3',  freq:130.81, oct:'sub' },
];

const SYNTH_PRESETS = {
  lead: {wave:'square',filter:4000,q:2,atk:5,dec:100,sus:60,rel:200,delay:30},
  bass: {wave:'sawtooth',filter:800,q:4,atk:5,dec:150,sus:40,rel:100,delay:0},
  pad:  {wave:'sawtooth',filter:2000,q:1,atk:400,dec:500,sus:70,rel:1500,delay:40},
  pluck:{wave:'triangle',filter:5000,q:3,atk:2,dec:80,sus:0,rel:150,delay:20},
  acid: {wave:'sawtooth',filter:600,q:18,atk:2,dec:120,sus:0,rel:50,delay:10},
  sub:  {wave:'sine',filter:400,q:0,atk:10,dec:300,sus:60,rel:200,delay:0},
};

const MAX_SAMPLES = 4;

// ─── STATE ───
let ctx = null, masterGain, compressor, analyser;
let delayNode, delayGain, delayFeedback;
let noiseBuffer;
let drumGrid = DRUMS.map(()=> new Array(STEPS).fill(false));
let synthGrid = SYNTH_NOTES.map(()=> new Array(STEPS).fill(false));
let samplerGrid = [];
for (let i=0; i<MAX_SAMPLES; i++) samplerGrid.push(new Array(STEPS).fill(false));

let drumMute = new Array(DRUMS.length).fill(false);
let drumVol = new Array(DRUMS.length).fill(80);
let synthMute = false;
let synthVol = 80;
let samplerMute = new Array(MAX_SAMPLES).fill(false);
let samplerVol = new Array(MAX_SAMPLES).fill(80);

let samples = new Array(MAX_SAMPLES).fill(null);
let sampleNames = new Array(MAX_SAMPLES).fill('');
let isRecording = false;
let mediaRecorder = null;
let recordChunks = [];
let currentPattern = 0;
let patterns = new Array(8).fill(null);

let isPlaying = false;
let currentStep = -1;
let nextNoteTime = 0;
let scheduleTimer = null;
const SCHEDULE_AHEAD = 0.08;
const LOOKAHEAD = 20;

// ─── AUDIO INIT ───
function initAudio() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -18;
  compressor.knee.value = 8;
  compressor.ratio.value = 6;

  masterGain = ctx.createGain();
  masterGain.gain.value = 0.75;

  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  delayNode = ctx.createDelay(1);
  delayNode.delayTime.value = 0.33;
  delayGain = ctx.createGain();
  delayGain.gain.value = 0;
  delayFeedback = ctx.createGain();
  delayFeedback.gain.value = 0.35;

  masterGain.connect(compressor);
  masterGain.connect(delayNode);
  delayNode.connect(delayGain);
  delayNode.connect(delayFeedback);
  delayFeedback.connect(delayNode);
  delayGain.connect(compressor);
  compressor.connect(analyser);
  analyser.connect(ctx.destination);

  const len = ctx.sampleRate * 2;
  noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
}

// ─── DRUM SYNTHESIS ───
function playDrum(key, time, vol) {
  const v = vol / 100;
  const t = time;
  switch(key) {
    case 'kick': {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.12);
      const g = ctx.createGain();
      g.gain.setValueAtTime(v, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + 0.45);

      const click = ctx.createBufferSource();
      click.buffer = noiseBuffer;
      const clickF = ctx.createBiquadFilter();
      clickF.type = 'highpass'; clickF.frequency.value = 800;
      const clickG = ctx.createGain();
      clickG.gain.setValueAtTime(v * 0.6, t);
      clickG.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
      click.connect(clickF); clickF.connect(clickG); clickG.connect(masterGain);
      click.start(t); click.stop(t + 0.03);
      break;
    }
    case 'snare': {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, t);
      const og = ctx.createGain();
      og.gain.setValueAtTime(v * 0.5, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.connect(og); og.connect(masterGain);
      osc.start(t); osc.stop(t + 0.15);

      const ns = ctx.createBufferSource();
      ns.buffer = noiseBuffer;
      const nf = ctx.createBiquadFilter();
      nf.type = 'bandpass'; nf.frequency.value = 3000; nf.Q.value = 1;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(v * 0.7, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
      ns.start(t); ns.stop(t + 0.2);
      break;
    }
    case 'chh': {
      const freqs = [800, 1050, 1300, 1550, 1850, 2150];
      freqs.forEach(f => {
        const o = ctx.createOscillator();
        o.type = 'square'; o.frequency.value = f;
        const g = ctx.createGain();
        g.gain.setValueAtTime(v * 0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        const hp = ctx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 7000;
        o.connect(hp); hp.connect(g); g.connect(masterGain);
        o.start(t); o.stop(t + 0.08);
      });
      break;
    }
    case 'ohh': {
      const freqs = [800, 1050, 1300, 1550, 1850, 2150];
      freqs.forEach(f => {
        const o = ctx.createOscillator();
        o.type = 'square'; o.frequency.value = f;
        const g = ctx.createGain();
        g.gain.setValueAtTime(v * 0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        const hp = ctx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 7000;
        o.connect(hp); hp.connect(g); g.connect(masterGain);
        o.start(t); o.stop(t + 0.4);
      });
      break;
    }
    case 'clap': {
      for (let i = 0; i < 3; i++) {
        const ns = ctx.createBufferSource();
        ns.buffer = noiseBuffer;
        const nf = ctx.createBiquadFilter();
        nf.type = 'bandpass'; nf.frequency.value = 1500; nf.Q.value = 0.8;
        const ng = ctx.createGain();
        const offset = i * 0.015;
        ng.gain.setValueAtTime(0, t + offset);
        ng.gain.linearRampToValueAtTime(v * 0.6, t + offset + 0.003);
        ng.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.04);
        ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
        ns.start(t + offset); ns.stop(t + offset + 0.05);
      }
      const tail = ctx.createBufferSource();
      tail.buffer = noiseBuffer;
      const tf = ctx.createBiquadFilter();
      tf.type = 'bandpass'; tf.frequency.value = 1500; tf.Q.value = 0.8;
      const tg = ctx.createGain();
      tg.gain.setValueAtTime(v * 0.5, t + 0.045);
      tg.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      tail.connect(tf); tf.connect(tg); tg.connect(masterGain);
      tail.start(t + 0.045); tail.stop(t + 0.25);
      break;
    }
    case 'tomL': {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.15);
      const g = ctx.createGain();
      g.gain.setValueAtTime(v * 0.8, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + 0.4);
      break;
    }
    case 'tomH': {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
      const g = ctx.createGain();
      g.gain.setValueAtTime(v * 0.8, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + 0.3);
      break;
    }
    case 'rim': {
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(820, t);
      const g = ctx.createGain();
      g.gain.setValueAtTime(v * 0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + 0.05);

      const ns = ctx.createBufferSource();
      ns.buffer = noiseBuffer;
      const nf = ctx.createBiquadFilter();
      nf.type = 'highpass'; nf.frequency.value = 4000;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(v * 0.4, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
      ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
      ns.start(t); ns.stop(t + 0.03);
      break;
    }
  }
}

// ─── SYNTH ENGINE ───
function playSynth(freq, time) {
  const now = time;
  const wave = document.getElementById('synthWave').value;
  const cutoff = +document.getElementById('synthFilter').value;
  const q = +document.getElementById('synthQ').value;
  const atk = +document.getElementById('synthAtk').value / 1000;
  const dec = +document.getElementById('synthDec').value / 1000;
  const sus = +document.getElementById('synthSus').value / 100;
  const rel = +document.getElementById('synthRel').value / 1000;
  const v = synthVol / 100;

  const osc1 = ctx.createOscillator();
  osc1.type = wave; osc1.frequency.setValueAtTime(freq, now);
  const osc2 = ctx.createOscillator();
  osc2.type = wave; osc2.frequency.setValueAtTime(freq * 1.004, now);

  const mix = ctx.createGain(); mix.gain.value = 0.4;
  const flt = ctx.createBiquadFilter();
  flt.type = 'lowpass';
  flt.frequency.setValueAtTime(Math.min(cutoff, 120), now);
  flt.frequency.linearRampToValueAtTime(cutoff, now + atk);
  flt.frequency.linearRampToValueAtTime(cutoff * 0.3 + 100, now + atk + dec);
  flt.Q.value = q;

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(v * 0.3, now + atk);
  env.gain.linearRampToValueAtTime(v * 0.3 * sus, now + atk + dec);
  env.gain.linearRampToValueAtTime(0, now + atk + dec + rel);

  osc1.connect(mix); osc2.connect(mix);
  mix.connect(flt); flt.connect(env); env.connect(masterGain);
  const end = now + atk + dec + rel + 0.05;
  osc1.start(now); osc2.start(now);
  osc1.stop(end); osc2.stop(end);
}

// ─── SAMPLER ENGINE ───
function playSample(idx, time) {
  if (!samples[idx]) return;
  const src = ctx.createBufferSource();
  src.buffer = samples[idx];
  const g = ctx.createGain();
  g.gain.value = samplerVol[idx] / 100;
  src.connect(g); g.connect(masterGain);
  src.start(time);
}

// ─── SCHEDULER ───
function scheduler() {
  while (nextNoteTime < ctx.currentTime + SCHEDULE_AHEAD) {
    scheduleStep(currentStep, nextNoteTime);
    advanceStep();
  }
  scheduleTimer = setTimeout(scheduler, LOOKAHEAD);
}

function scheduleStep(step, time) {
  requestAnimationFrame(() => updateHeadUI(step));

  DRUMS.forEach((drum, i) => {
    if (drumGrid[i][step] && !drumMute[i]) {
      playDrum(drum.key, time, drumVol[i]);
    }
  });

  if (!synthMute) {
    SYNTH_NOTES.forEach((note, i) => {
      if (synthGrid[i][step]) {
        playSynth(note.freq, time);
      }
    });
  }

  for (let i = 0; i < MAX_SAMPLES; i++) {
    if (samplerGrid[i][step] && !samplerMute[i] && samples[i]) {
      playSample(i, time);
    }
  }
}

function advanceStep() {
  const bpm = +document.getElementById('bpm').value;
  const swingAmt = +document.getElementById('swing').value / 100;
  const sixteenth = 60 / bpm / 4;

  currentStep = (currentStep + 1) % STEPS;
  const isOdd = currentStep % 2 === 1;
  nextNoteTime += sixteenth * (isOdd ? (1 + swingAmt * 0.6) : (1 - swingAmt * 0.6));
}

function startPlaying() {
  if (isPlaying) return;
  initAudio();
  if (ctx.state === 'suspended') ctx.resume();
  isPlaying = true;
  currentStep = -1;
  nextNoteTime = ctx.currentTime;
  advanceStep();
  scheduler();
  document.getElementById('playBtn').classList.add('on');
}

function stopPlaying() {
  isPlaying = false;
  clearTimeout(scheduleTimer);
  currentStep = -1;
  document.getElementById('playBtn').classList.remove('on');
  document.querySelectorAll('.cell.head').forEach(c => c.classList.remove('head'));
}

function updateHeadUI(step) {
  document.querySelectorAll('.cell.head').forEach(c => c.classList.remove('head'));
  document.querySelectorAll(`.cell[data-step="${step}"]`).forEach(c => c.classList.add('head'));
}

// ─── RECORDING (Sampler) ───
async function toggleRecording() {
  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('recBtn').classList.remove('rec-on');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    recordChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(recordChunks, { type: 'audio/webm' });
      await loadSampleFromBlob(blob, 'Recording');
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('recBtn').classList.add('rec-on');
  } catch (e) {
    alert('Microphone access denied');
  }
}

async function loadSampleFromBlob(blob, name) {
  initAudio();
  const ab = await blob.arrayBuffer();
  const buffer = await ctx.decodeAudioData(ab);
  const slot = samples.findIndex(s => s === null);
  if (slot === -1) { alert('All sample slots full'); return; }
  samples[slot] = buffer;
  sampleNames[slot] = name;
  renderSamplerSlots();
  renderSamplerGrid();
}

function handleFiles(e) {
  for (const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = async (ev) => {
      initAudio();
      const buffer = await ctx.decodeAudioData(ev.target.result);
      const slot = samples.findIndex(s => s === null);
      if (slot === -1) { alert('All sample slots full'); return; }
      samples[slot] = buffer;
      sampleNames[slot] = file.name.replace(/\.[^.]+$/, '').substring(0, 12);
      renderSamplerSlots();
      renderSamplerGrid();
    };
    reader.readAsArrayBuffer(file);
  }
  e.target.value = '';
}

function deleteSample(idx) {
  samples[idx] = null;
  sampleNames[idx] = '';
  samplerGrid[idx].fill(false);
  renderSamplerSlots();
  renderSamplerGrid();
}

function renderSamplerSlots() {
  const el = document.getElementById('smpSlots');
  el.innerHTML = '';
  for (let i = 0; i < MAX_SAMPLES; i++) {
    if (!samples[i]) continue;
    const s = document.createElement('div');
    s.className = 'smp-slot has-sample';
    s.innerHTML = `<span class="smp-name">${sampleNames[i]}</span><span class="smp-del" onclick="deleteSample(${i})">&times;</span>`;
    s.addEventListener('click', (e) => {
      if (e.target.classList.contains('smp-del')) return;
      initAudio(); playSample(i, ctx.currentTime);
    });
    el.appendChild(s);
  }
}

// ─── GRID BUILDERS ───
function buildDrumGrid() {
  const el = document.getElementById('drumGrid');
  el.innerHTML = '';
  el.style.gridTemplateColumns = `90px repeat(${STEPS}, 1fr)`;

  el.appendChild(document.createElement('div'));
  for (let s = 0; s < STEPS; s++) {
    const n = document.createElement('div');
    n.className = 'step-num'; n.textContent = s + 1;
    el.appendChild(n);
  }

  DRUMS.forEach((drum, ri) => {
    const lbl = document.createElement('div');
    lbl.className = 'lbl';
    const mBtn = document.createElement('span');
    mBtn.className = 'lbl-mute' + (drumMute[ri] ? ' on' : '');
    mBtn.textContent = 'M';
    mBtn.onclick = () => { drumMute[ri] = !drumMute[ri]; mBtn.classList.toggle('on'); };
    const nm = document.createElement('span');
    nm.className = 'lbl-name'; nm.textContent = drum.name;
    lbl.appendChild(mBtn); lbl.appendChild(nm);
    el.appendChild(lbl);

    for (let s = 0; s < STEPS; s++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (drumGrid[ri][s] ? ' on' : '');
      cell.dataset.step = s; cell.dataset.section = 'drum'; cell.dataset.row = ri;
      if (s % 4 === 0) cell.dataset.beat = '0';
      cell.onclick = () => {
        initAudio();
        drumGrid[ri][s] = !drumGrid[ri][s];
        cell.classList.toggle('on');
        if (drumGrid[ri][s]) playDrum(drum.key, ctx.currentTime, drumVol[ri]);
      };
      el.appendChild(cell);
    }
  });
}

function buildSynthGrid() {
  const el = document.getElementById('synthGrid');
  el.innerHTML = '';
  el.style.gridTemplateColumns = `90px repeat(${STEPS}, 1fr)`;

  el.appendChild(document.createElement('div'));
  for (let s = 0; s < STEPS; s++) {
    const n = document.createElement('div');
    n.className = 'step-num'; n.textContent = s + 1;
    el.appendChild(n);
  }

  SYNTH_NOTES.forEach((note, ri) => {
    const lbl = document.createElement('div');
    lbl.className = 'lbl';
    const nm = document.createElement('span');
    nm.className = 'lbl-name'; nm.textContent = note.name;
    nm.dataset.oct = note.oct;
    lbl.appendChild(nm);
    el.appendChild(lbl);

    for (let s = 0; s < STEPS; s++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (synthGrid[ri][s] ? ' on' : '');
      cell.dataset.step = s; cell.dataset.section = 'synth'; cell.dataset.row = ri;
      cell.dataset.oct = note.oct;
      if (s % 4 === 0) cell.dataset.beat = '0';
      cell.onclick = () => {
        initAudio();
        synthGrid[ri][s] = !synthGrid[ri][s];
        cell.classList.toggle('on');
        if (synthGrid[ri][s]) playSynth(note.freq, ctx.currentTime);
      };
      el.appendChild(cell);
    }
  });
}

function renderSamplerGrid() {
  const el = document.getElementById('samplerGrid');
  el.innerHTML = '';
  const activeSamples = samples.reduce((c, s) => c + (s ? 1 : 0), 0);
  if (activeSamples === 0) { el.style.display = 'none'; return; }
  el.style.display = 'grid';
  el.style.gridTemplateColumns = `90px repeat(${STEPS}, 1fr)`;

  el.appendChild(document.createElement('div'));
  for (let s = 0; s < STEPS; s++) {
    const n = document.createElement('div');
    n.className = 'step-num'; n.textContent = s + 1;
    el.appendChild(n);
  }

  for (let i = 0; i < MAX_SAMPLES; i++) {
    if (!samples[i]) continue;
    const lbl = document.createElement('div');
    lbl.className = 'lbl';
    const mBtn = document.createElement('span');
    mBtn.className = 'lbl-mute' + (samplerMute[i] ? ' on' : '');
    mBtn.textContent = 'M';
    mBtn.onclick = () => { samplerMute[i] = !samplerMute[i]; mBtn.classList.toggle('on'); };
    const nm = document.createElement('span');
    nm.className = 'lbl-name'; nm.textContent = sampleNames[i];
    lbl.appendChild(mBtn); lbl.appendChild(nm);
    el.appendChild(lbl);

    for (let s = 0; s < STEPS; s++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (samplerGrid[i][s] ? ' on' : '');
      cell.dataset.step = s; cell.dataset.section = 'sampler'; cell.dataset.row = i;
      if (s % 4 === 0) cell.dataset.beat = '0';
      cell.onclick = () => {
        initAudio();
        samplerGrid[i][s] = !samplerGrid[i][s];
        cell.classList.toggle('on');
        if (samplerGrid[i][s]) playSample(i, ctx.currentTime);
      };
      el.appendChild(cell);
    }
  }
}

// ─── PATTERNS ───
function savePattern() {
  patterns[currentPattern] = {
    drums: drumGrid.map(r => [...r]),
    synth: synthGrid.map(r => [...r]),
    sampler: samplerGrid.map(r => [...r]),
    synthParams: {
      wave: document.getElementById('synthWave').value,
      filter: +document.getElementById('synthFilter').value,
      q: +document.getElementById('synthQ').value,
      atk: +document.getElementById('synthAtk').value,
      dec: +document.getElementById('synthDec').value,
      sus: +document.getElementById('synthSus').value,
      rel: +document.getElementById('synthRel').value,
      delay: +document.getElementById('synthDelay').value,
    },
    bpm: +document.getElementById('bpm').value,
    swing: +document.getElementById('swing').value,
  };
  try { localStorage.setItem('midiSynthi', JSON.stringify(patterns)); } catch(e) {}
  renderPatternBtns();
}

function loadPattern(idx) {
  currentPattern = idx;
  const p = patterns[idx];
  if (p) {
    drumGrid = p.drums.map(r => [...r]);
    synthGrid = p.synth.map(r => [...r]);
    if (p.sampler) samplerGrid = p.sampler.map(r => [...r]);
    if (p.synthParams) {
      const sp = p.synthParams;
      document.getElementById('synthWave').value = sp.wave;
      document.getElementById('synthFilter').value = sp.filter;
      document.getElementById('synthQ').value = sp.q;
      document.getElementById('synthAtk').value = sp.atk;
      document.getElementById('synthDec').value = sp.dec;
      document.getElementById('synthSus').value = sp.sus;
      document.getElementById('synthRel').value = sp.rel;
      document.getElementById('synthDelay').value = sp.delay;
      updateSynthDisplays();
    }
    if (p.bpm) { document.getElementById('bpm').value = p.bpm; document.getElementById('bpmV').textContent = p.bpm; }
    if (p.swing !== undefined) { document.getElementById('swing').value = p.swing; document.getElementById('swingV').textContent = p.swing + '%'; }
  }
  buildDrumGrid();
  buildSynthGrid();
  renderSamplerGrid();
  renderPatternBtns();
}

function renderPatternBtns() {
  const el = document.getElementById('patterns');
  el.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('button');
    b.className = 'pat-btn' + (i === currentPattern ? ' active' : '') + (patterns[i] ? ' has-data' : '');
    b.textContent = 'P' + (i + 1);
    b.onclick = () => loadPattern(i);
    el.appendChild(b);
  }
}

function clearAll() {
  drumGrid = DRUMS.map(() => new Array(STEPS).fill(false));
  synthGrid = SYNTH_NOTES.map(() => new Array(STEPS).fill(false));
  samplerGrid = [];
  for (let i = 0; i < MAX_SAMPLES; i++) samplerGrid.push(new Array(STEPS).fill(false));
  buildDrumGrid(); buildSynthGrid(); renderSamplerGrid();
}

// ─── SYNTH PRESETS ───
function applySynthPreset(name) {
  const p = SYNTH_PRESETS[name];
  if (!p) return;
  document.getElementById('synthWave').value = p.wave;
  document.getElementById('synthFilter').value = p.filter;
  document.getElementById('synthQ').value = p.q;
  document.getElementById('synthAtk').value = p.atk;
  document.getElementById('synthDec').value = p.dec;
  document.getElementById('synthSus').value = p.sus;
  document.getElementById('synthRel').value = p.rel;
  document.getElementById('synthDelay').value = p.delay;
  updateSynthDisplays();
}

function updateSynthDisplays() {
  document.getElementById('synthFilterV').textContent = document.getElementById('synthFilter').value;
  document.getElementById('synthQV').textContent = (+document.getElementById('synthQ').value).toFixed(1);
  document.getElementById('synthAtkV').textContent = document.getElementById('synthAtk').value;
  document.getElementById('synthDecV').textContent = document.getElementById('synthDec').value;
  document.getElementById('synthSusV').textContent = document.getElementById('synthSus').value + '%';
  document.getElementById('synthRelV').textContent = document.getElementById('synthRel').value;
  document.getElementById('synthDelayV').textContent = document.getElementById('synthDelay').value + '%';
}

// ─── SECTION TOGGLE ───
function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ─── VISUALIZER ───
function initVisualizer() {
  const c = document.getElementById('visCanvas');
  const cx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function resize() {
    c.width = c.offsetWidth * dpr;
    c.height = c.offsetHeight * dpr;
    cx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);

  const w = () => c.offsetWidth;
  const h = () => c.offsetHeight;

  function draw() {
    requestAnimationFrame(draw);
    const W = w(), H = h();
    cx.fillStyle = 'rgba(8,8,15,0.35)';
    cx.fillRect(0, 0, W, H);
    if (!analyser) return;

    const buf = analyser.frequencyBinCount;
    const data = new Uint8Array(buf);
    analyser.getByteTimeDomainData(data);

    cx.lineWidth = 1.5;
    cx.strokeStyle = '#00e5ff';
    cx.shadowBlur = 6;
    cx.shadowColor = '#00e5ff';
    cx.beginPath();
    const sl = W / buf;
    let x = 0;
    for (let i = 0; i < buf; i++) {
      const y = (data[i] / 128) * H / 2;
      i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
      x += sl;
    }
    cx.lineTo(W, H / 2);
    cx.stroke();
    cx.shadowBlur = 0;

    // frequency bars
    const fData = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(fData);
    const barCount = 48;
    const barW = W / barCount;
    cx.globalAlpha = 0.15;
    for (let i = 0; i < barCount; i++) {
      const idx = Math.floor(i * fData.length / barCount);
      const barH = (fData[idx] / 255) * H;
      const hue = (i / barCount) * 280;
      cx.fillStyle = `hsl(${hue},80%,55%)`;
      cx.fillRect(i * barW, H - barH, barW - 1, barH);
    }
    cx.globalAlpha = 1;
  }
  draw();
}

// ─── EVENT LISTENERS ───
document.getElementById('playBtn').onclick = startPlaying;
document.getElementById('stopBtn').onclick = stopPlaying;
document.getElementById('clearAllBtn').onclick = clearAll;
document.getElementById('saveBtn').onclick = savePattern;
document.getElementById('loadBtn').onclick = () => {
  try {
    const d = localStorage.getItem('midiSynthi');
    if (d) { patterns = JSON.parse(d); renderPatternBtns(); loadPattern(currentPattern); }
  } catch(e) {}
};

document.getElementById('bpm').oninput = function() { document.getElementById('bpmV').textContent = this.value; };
document.getElementById('swing').oninput = function() { document.getElementById('swingV').textContent = this.value + '%'; };
document.getElementById('masterVol').oninput = function() {
  document.getElementById('masterV').textContent = this.value + '%';
  if (masterGain) masterGain.gain.value = this.value / 100;
};

['synthFilter','synthQ','synthAtk','synthDec','synthSus','synthRel','synthDelay'].forEach(id => {
  document.getElementById(id).oninput = updateSynthDisplays;
});

document.getElementById('synthDelay').addEventListener('input', function() {
  if (delayGain) delayGain.gain.value = this.value / 100;
});

document.getElementById('synthPreset').onchange = function() {
  if (this.value) applySynthPreset(this.value);
  this.value = '';
};

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); isPlaying ? stopPlaying() : startPlaying(); }
});

// ─── INIT ───
buildDrumGrid();
buildSynthGrid();
renderSamplerGrid();
renderPatternBtns();
initVisualizer();

try {
  const d = localStorage.getItem('midiSynthi');
  if (d) { patterns = JSON.parse(d); renderPatternBtns(); }
} catch(e) {}
