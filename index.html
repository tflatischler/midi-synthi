<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI SYNTHI — Step Sequencer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a14;
    --surface: #12121f;
    --surface2: #1a1a2e;
    --border: #2a2a3e;
    --text: #e0e0f0;
    --text-dim: #6a6a8a;
    --accent: #00e5ff;
    --accent-glow: rgba(0,229,255,0.3);
    --accent2: #ff2d75;
    --accent2-glow: rgba(255,45,117,0.3);
    --accent3: #b44dff;
    --accent3-glow: rgba(180,77,255,0.3);
    --accent4: #00ff88;
    --accent4-glow: rgba(0,255,136,0.3);
    --playhead: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  header {
    text-align: center;
    padding: 30px 0 20px;
    position: relative;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 2.8rem;
    letter-spacing: 0.3em;
    background: linear-gradient(135deg, var(--accent), var(--accent3), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px var(--accent-glow));
  }

  header .subtitle {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.5em;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    align-items: flex-end;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-group label {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .transport {
    display: flex;
    gap: 8px;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 10px 20px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .btn:hover {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn.stop:hover { border-color: var(--accent2); box-shadow: 0 0 12px var(--accent2-glow); }
  .btn.clear:hover { border-color: var(--accent3); box-shadow: 0 0 12px var(--accent3-glow); }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 6px;
    border-radius: 3px;
    background: var(--surface2);
    outline: none;
    border: 1px solid var(--border);
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .range-value {
    font-size: 0.7rem;
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    min-width: 40px;
    text-align: center;
  }

  select {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 8px 12px;
    background: var(--surface2);
    color: var(--text);
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    outline: none;
  }

  select:hover, select:focus {
    border-color: var(--accent);
  }

  .sequencer-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    overflow-x: auto;
  }

  .sequencer {
    display: grid;
    gap: 3px;
    min-width: 700px;
  }

  .note-label {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 50px;
  }

  .step {
    width: 100%;
    aspect-ratio: 1;
    min-width: 28px;
    max-width: 48px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
  }

  .step:hover {
    border-color: #444;
    background: #151525;
  }

  .step.active {
    border-color: transparent;
  }

  .step.playhead {
    background: var(--playhead) !important;
  }

  .step.playhead.active {
    filter: brightness(1.4);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .step[data-octave="high"].active {
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2-glow);
  }
  .note-label[data-octave="high"] { color: var(--accent2); }

  .step[data-octave="mid"].active {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }
  .note-label[data-octave="mid"] { color: var(--accent); }

  .step[data-octave="low"].active {
    background: var(--accent3);
    box-shadow: 0 0 10px var(--accent3-glow);
  }
  .note-label[data-octave="low"] { color: var(--accent3); }

  .step[data-octave="sub"].active {
    background: var(--accent4);
    box-shadow: 0 0 10px var(--accent4-glow);
  }
  .note-label[data-octave="sub"] { color: var(--accent4); }

  .step[data-beat="0"] { border-left: 2px solid #333; }

  .step-number {
    text-align: center;
    font-size: 0.55rem;
    color: var(--text-dim);
    padding-bottom: 4px;
    font-family: 'Orbitron', sans-serif;
  }

  .visualizer-container {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    height: 120px;
    position: relative;
    overflow: hidden;
  }

  canvas#visualizer {
    width: 100%;
    height: 100%;
    display: block;
  }

  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .preset-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .preset-btn.loaded {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  footer {
    text-align: center;
    padding: 20px 0;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .control-separator {
    width: 1px;
    background: var(--border);
    align-self: stretch;
    margin: 0 4px;
  }

  @media (max-width: 768px) {
    header h1 { font-size: 1.6rem; }
    .controls { gap: 10px; padding: 12px; }
    input[type="range"] { width: 80px; }
    .sequencer-container { padding: 10px; }
    .step { min-width: 22px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>MIDI SYNTHI</h1>
    <div class="subtitle">STEP SEQUENCER &mdash; WEB AUDIO SYNTHESIZER</div>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>Transport</label>
      <div class="transport">
        <button class="btn play" id="playBtn">&#9654; Play</button>
        <button class="btn stop" id="stopBtn">&#9632; Stop</button>
        <button class="btn clear" id="clearBtn">&#10005; Clear</button>
      </div>
    </div>

    <div class="control-separator"></div>

    <div class="control-group">
      <label>Tempo</label>
      <input type="range" id="tempo" min="40" max="240" value="120">
      <span class="range-value" id="tempoVal">120 BPM</span>
    </div>

    <div class="control-separator"></div>

    <div class="control-group">
      <label>Waveform</label>
      <select id="waveform">
        <option value="sawtooth">Sawtooth</option>
        <option value="square">Square</option>
        <option value="sine">Sine</option>
        <option value="triangle">Triangle</option>
      </select>
    </div>

    <div class="control-separator"></div>

    <div class="control-group">
      <label>Filter</label>
      <input type="range" id="filterCutoff" min="100" max="8000" value="3000">
      <span class="range-value" id="filterVal">3000 Hz</span>
    </div>

    <div class="control-group">
      <label>Resonance</label>
      <input type="range" id="filterQ" min="0" max="20" value="1" step="0.5">
      <span class="range-value" id="filterQVal">1.0</span>
    </div>

    <div class="control-separator"></div>

    <div class="control-group">
      <label>Attack</label>
      <input type="range" id="attack" min="0" max="500" value="10">
      <span class="range-value" id="attackVal">10 ms</span>
    </div>

    <div class="control-group">
      <label>Decay</label>
      <input type="range" id="decay" min="10" max="1000" value="200">
      <span class="range-value" id="decayVal">200 ms</span>
    </div>

    <div class="control-group">
      <label>Sustain</label>
      <input type="range" id="sustain" min="0" max="100" value="30">
      <span class="range-value" id="sustainVal">30%</span>
    </div>

    <div class="control-group">
      <label>Release</label>
      <input type="range" id="release" min="10" max="2000" value="300">
      <span class="range-value" id="releaseVal">300 ms</span>
    </div>

    <div class="control-separator"></div>

    <div class="control-group">
      <label>Delay</label>
      <input type="range" id="delayMix" min="0" max="80" value="0">
      <span class="range-value" id="delayVal">0%</span>
    </div>

    <div class="control-group">
      <label>Volume</label>
      <input type="range" id="volume" min="0" max="100" value="70">
      <span class="range-value" id="volumeVal">70%</span>
    </div>
  </div>

  <div class="presets">
    <span style="font-size:0.65rem; color:var(--text-dim); align-self:center; margin-right:4px;">PRESETS:</span>
    <button class="preset-btn" data-preset="bass">Bass</button>
    <button class="preset-btn" data-preset="lead">Lead</button>
    <button class="preset-btn" data-preset="pad">Pad</button>
    <button class="preset-btn" data-preset="pluck">Pluck</button>
    <button class="preset-btn" data-preset="acid">Acid</button>
    <button class="preset-btn" data-preset="sub">Sub Bass</button>
  </div>

  <div class="sequencer-container">
    <div class="sequencer" id="sequencer"></div>
  </div>

  <div class="visualizer-container">
    <canvas id="visualizer"></canvas>
  </div>

  <footer>
    MIDI SYNTHI &mdash; Built with Web Audio API
  </footer>
</div>

<script>
const NOTES = [
  { name: 'C5',  freq: 523.25, octave: 'high' },
  { name: 'Bb4', freq: 466.16, octave: 'high' },
  { name: 'G4',  freq: 392.00, octave: 'high' },
  { name: 'F4',  freq: 349.23, octave: 'mid' },
  { name: 'Eb4', freq: 311.13, octave: 'mid' },
  { name: 'C4',  freq: 261.63, octave: 'mid' },
  { name: 'Bb3', freq: 233.08, octave: 'low' },
  { name: 'G3',  freq: 196.00, octave: 'low' },
  { name: 'F3',  freq: 174.61, octave: 'low' },
  { name: 'Eb3', freq: 155.56, octave: 'sub' },
  { name: 'C3',  freq: 130.81, octave: 'sub' },
  { name: 'Bb2', freq: 116.54, octave: 'sub' },
  { name: 'G2',  freq: 98.00,  octave: 'sub' },
];

const STEPS = 16;
const PRESETS = {
  bass: { waveform:'sawtooth', filterCutoff:800, filterQ:4, attack:5, decay:150, sustain:40, release:100, delayMix:0 },
  lead: { waveform:'square', filterCutoff:4000, filterQ:2, attack:5, decay:100, sustain:60, release:200, delayMix:30 },
  pad:  { waveform:'sawtooth', filterCutoff:2000, filterQ:1, attack:400, decay:500, sustain:70, release:1500, delayMix:40 },
  pluck:{ waveform:'triangle', filterCutoff:5000, filterQ:3, attack:2, decay:80, sustain:0, release:150, delayMix:20 },
  acid: { waveform:'sawtooth', filterCutoff:600, filterQ:18, attack:2, decay:120, sustain:0, release:50, delayMix:10 },
  sub:  { waveform:'sine', filterCutoff:400, filterQ:0, attack:10, decay:300, sustain:60, release:200, delayMix:0 },
};

let audioCtx = null;
let masterGain = null;
let compressor = null;
let delayNode = null;
let delayGain = null;
let delayFeedback = null;
let analyser = null;

let grid = [];
let currentStep = -1;
let isPlaying = false;
let intervalId = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -20;
  compressor.knee.value = 10;
  compressor.ratio.value = 8;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;

  delayNode = audioCtx.createDelay(1);
  delayNode.delayTime.value = 0.3;
  delayGain = audioCtx.createGain();
  delayGain.gain.value = 0;
  delayFeedback = audioCtx.createGain();
  delayFeedback.gain.value = 0.4;

  masterGain.connect(compressor);
  masterGain.connect(delayNode);
  delayNode.connect(delayGain);
  delayNode.connect(delayFeedback);
  delayFeedback.connect(delayNode);
  delayGain.connect(compressor);
  compressor.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function playNote(freq) {
  if (!audioCtx) return;

  const now = audioCtx.currentTime;
  const waveform = document.getElementById('waveform').value;
  const cutoff = parseFloat(document.getElementById('filterCutoff').value);
  const q = parseFloat(document.getElementById('filterQ').value);
  const atk = parseFloat(document.getElementById('attack').value) / 1000;
  const dec = parseFloat(document.getElementById('decay').value) / 1000;
  const sus = parseFloat(document.getElementById('sustain').value) / 100;
  const rel = parseFloat(document.getElementById('release').value) / 1000;

  const osc = audioCtx.createOscillator();
  osc.type = waveform;
  osc.frequency.setValueAtTime(freq, now);

  const osc2 = audioCtx.createOscillator();
  osc2.type = waveform;
  osc2.frequency.setValueAtTime(freq * 1.003, now);

  const oscGain = audioCtx.createGain();
  oscGain.gain.value = 0.5;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(Math.min(cutoff, 100), now);
  filter.frequency.linearRampToValueAtTime(cutoff, now + atk);
  filter.frequency.linearRampToValueAtTime(cutoff * 0.3 + 100, now + atk + dec);
  filter.Q.value = q;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.35, now + atk);
  env.gain.linearRampToValueAtTime(0.35 * sus, now + atk + dec);
  env.gain.linearRampToValueAtTime(0, now + atk + dec + rel);

  osc.connect(oscGain);
  osc2.connect(oscGain);
  oscGain.connect(filter);
  filter.connect(env);
  env.connect(masterGain);

  osc.start(now);
  osc2.start(now);
  osc.stop(now + atk + dec + rel + 0.05);
  osc2.stop(now + atk + dec + rel + 0.05);
}

function buildGrid() {
  const seq = document.getElementById('sequencer');
  seq.innerHTML = '';
  seq.style.gridTemplateColumns = `50px repeat(${STEPS}, 1fr)`;

  grid = NOTES.map(() => new Array(STEPS).fill(false));

  const placeholder = document.createElement('div');
  seq.appendChild(placeholder);
  for (let s = 0; s < STEPS; s++) {
    const num = document.createElement('div');
    num.className = 'step-number';
    num.textContent = s + 1;
    seq.appendChild(num);
  }

  NOTES.forEach((note, rowIdx) => {
    const label = document.createElement('div');
    label.className = 'note-label';
    label.dataset.octave = note.octave;
    label.textContent = note.name;
    seq.appendChild(label);

    for (let s = 0; s < STEPS; s++) {
      const step = document.createElement('div');
      step.className = 'step';
      step.dataset.row = rowIdx;
      step.dataset.step = s;
      step.dataset.octave = note.octave;
      if (s % 4 === 0) step.dataset.beat = '0';

      step.addEventListener('click', () => {
        initAudio();
        grid[rowIdx][s] = !grid[rowIdx][s];
        step.classList.toggle('active');
        if (grid[rowIdx][s]) {
          playNote(note.freq);
        }
      });

      seq.appendChild(step);
    }
  });
}

function updatePlayhead() {
  document.querySelectorAll('.step.playhead').forEach(el => el.classList.remove('playhead'));

  if (currentStep >= 0) {
    document.querySelectorAll(`.step[data-step="${currentStep}"]`).forEach(el => {
      el.classList.add('playhead');
    });
  }
}

function tick() {
  currentStep = (currentStep + 1) % STEPS;
  updatePlayhead();

  NOTES.forEach((note, rowIdx) => {
    if (grid[rowIdx][currentStep]) {
      playNote(note.freq);
    }
  });
}

function startSequencer() {
  if (isPlaying) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  isPlaying = true;

  const bpm = parseFloat(document.getElementById('tempo').value);
  const interval = (60 / bpm / 4) * 1000;
  intervalId = setInterval(tick, interval);
  document.getElementById('playBtn').classList.add('active');
}

function stopSequencer() {
  isPlaying = false;
  clearInterval(intervalId);
  currentStep = -1;
  updatePlayhead();
  document.getElementById('playBtn').classList.remove('active');
}

function clearGrid() {
  grid = NOTES.map(() => new Array(STEPS).fill(false));
  document.querySelectorAll('.step.active').forEach(el => el.classList.remove('active'));
}

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;

  document.getElementById('waveform').value = p.waveform;
  document.getElementById('filterCutoff').value = p.filterCutoff;
  document.getElementById('filterQ').value = p.filterQ;
  document.getElementById('attack').value = p.attack;
  document.getElementById('decay').value = p.decay;
  document.getElementById('sustain').value = p.sustain;
  document.getElementById('release').value = p.release;
  document.getElementById('delayMix').value = p.delayMix;

  updateAllDisplays();

  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('loaded'));
  document.querySelector(`.preset-btn[data-preset="${name}"]`).classList.add('loaded');
}

function updateAllDisplays() {
  document.getElementById('tempoVal').textContent = document.getElementById('tempo').value + ' BPM';
  document.getElementById('filterVal').textContent = document.getElementById('filterCutoff').value + ' Hz';
  document.getElementById('filterQVal').textContent = parseFloat(document.getElementById('filterQ').value).toFixed(1);
  document.getElementById('attackVal').textContent = document.getElementById('attack').value + ' ms';
  document.getElementById('decayVal').textContent = document.getElementById('decay').value + ' ms';
  document.getElementById('sustainVal').textContent = document.getElementById('sustain').value + '%';
  document.getElementById('releaseVal').textContent = document.getElementById('release').value + ' ms';
  document.getElementById('delayVal').textContent = document.getElementById('delayMix').value + '%';
  document.getElementById('volumeVal').textContent = document.getElementById('volume').value + '%';
}

function drawVisualizer() {
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  function draw() {
    requestAnimationFrame(draw);
    ctx.fillStyle = 'rgba(10, 10, 20, 0.3)';
    ctx.fillRect(0, 0, w, h);

    if (!analyser) return;

    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(data);

    ctx.lineWidth = 2;
    ctx.strokeStyle = '#00e5ff';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00e5ff';
    ctx.beginPath();

    const sliceW = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = data[i] / 128.0;
      const y = (v * h) / 2;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.lineTo(w, h / 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  draw();
}

document.getElementById('playBtn').addEventListener('click', startSequencer);
document.getElementById('stopBtn').addEventListener('click', stopSequencer);
document.getElementById('clearBtn').addEventListener('click', clearGrid);

document.getElementById('tempo').addEventListener('input', function() {
  document.getElementById('tempoVal').textContent = this.value + ' BPM';
  if (isPlaying) {
    clearInterval(intervalId);
    const interval = (60 / parseFloat(this.value) / 4) * 1000;
    intervalId = setInterval(tick, interval);
  }
});

document.getElementById('filterCutoff').addEventListener('input', function() {
  document.getElementById('filterVal').textContent = this.value + ' Hz';
});

document.getElementById('filterQ').addEventListener('input', function() {
  document.getElementById('filterQVal').textContent = parseFloat(this.value).toFixed(1);
});

document.getElementById('attack').addEventListener('input', function() {
  document.getElementById('attackVal').textContent = this.value + ' ms';
});

document.getElementById('decay').addEventListener('input', function() {
  document.getElementById('decayVal').textContent = this.value + ' ms';
});

document.getElementById('sustain').addEventListener('input', function() {
  document.getElementById('sustainVal').textContent = this.value + '%';
});

document.getElementById('release').addEventListener('input', function() {
  document.getElementById('releaseVal').textContent = this.value + ' ms';
});

document.getElementById('delayMix').addEventListener('input', function() {
  document.getElementById('delayVal').textContent = this.value + '%';
  if (delayGain) {
    delayGain.gain.value = parseFloat(this.value) / 100;
  }
});

document.getElementById('volume').addEventListener('input', function() {
  document.getElementById('volumeVal').textContent = this.value + '%';
  if (masterGain) {
    masterGain.gain.value = parseFloat(this.value) / 100;
  }
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (isPlaying) stopSequencer();
    else startSequencer();
  }
});

buildGrid();
drawVisualizer();
</script>
</body>
</html>
