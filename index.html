<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI SYNTHI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f;--sf:#0e0e1c;--sf2:#161630;--brd:#252545;
  --txt:#d0d0e8;--dim:#505070;
  --cyan:#00e5ff;--cg:rgba(0,229,255,.25);
  --pink:#ff2d75;--pg:rgba(255,45,117,.25);
  --purple:#b44dff;--ppg:rgba(180,77,255,.25);
  --green:#00ff88;--gg:rgba(0,255,136,.25);
  --orange:#ff8c00;--og:rgba(255,140,0,.25);
  --yellow:#ffe600;--yg:rgba(255,230,0,.25);
  --red:#ff4444;--rg:rgba(255,68,68,.25);
  --wkey:#e8e8f0;--bkey:#1a1a2a;
  --lane:14px;
}
body{background:var(--bg);color:var(--txt);font-family:'Share Tech Mono',monospace;overflow-x:hidden;touch-action:manipulation}
.app{max-width:1100px;margin:0 auto;padding:10px}

header{text-align:center;padding:12px 0 6px}
header h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.8rem;letter-spacing:.25em;
  background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 14px var(--cg))}

/* Transport */
.transport{display:flex;flex-wrap:wrap;gap:10px;padding:10px 14px;background:var(--sf);
  border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;align-items:flex-end}
.tg{display:flex;flex-direction:column;gap:2px}
.tg>label{font-size:.55rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.tg-row{display:flex;gap:5px}
.btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:.6rem;padding:7px 12px;
  border:2px solid var(--brd);border-radius:6px;background:var(--sf2);color:var(--txt);
  cursor:pointer;transition:all .1s;letter-spacing:.06em;text-transform:uppercase;user-select:none}
.btn:hover{border-color:var(--cyan);box-shadow:0 0 8px var(--cg)}
.btn.on{background:var(--cyan);color:var(--bg);border-color:var(--cyan);box-shadow:0 0 14px var(--cg)}
.btn.rec-on{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 14px var(--rg);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.sep{width:1px;background:var(--brd);align-self:stretch}
input[type=range]{-webkit-appearance:none;width:80px;height:4px;border-radius:2px;background:var(--sf2);border:1px solid var(--brd);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--cyan);cursor:pointer;box-shadow:0 0 5px var(--cg)}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--cyan);cursor:pointer;border:none}
.rv{font-size:.55rem;color:var(--cyan);font-family:'Orbitron',sans-serif;min-width:30px;text-align:center}
select{font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:5px 8px;background:var(--sf2);color:var(--txt);
  border:2px solid var(--brd);border-radius:6px;cursor:pointer;outline:none}
select:focus{border-color:var(--cyan)}

/* Timeline */
.timeline-wrap{background:var(--sf);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;overflow:hidden}
.timeline{display:flex;height:300px}
.tl-labels{width:48px;flex-shrink:0;overflow:hidden;background:var(--sf);border-right:1px solid var(--brd);z-index:2}
.tl-label{height:var(--lane);display:flex;align-items:center;justify-content:flex-end;padding-right:4px;
  font-family:'Orbitron',sans-serif;font-size:.4rem;font-weight:700;color:var(--dim);
  border-bottom:1px solid rgba(255,255,255,.03)}
.tl-label.white-key{background:rgba(255,255,255,.02)}
.tl-label.drum-label{color:var(--orange)}
.tl-label.section-sep{border-top:2px solid var(--brd);margin-top:0}
.tl-scroll{flex:1;overflow:auto;position:relative}
.tl-grid{position:relative;min-height:100%}
.tl-note{position:absolute;height:calc(var(--lane) - 2px);border-radius:2px;cursor:pointer;opacity:.85;transition:opacity .1s}
.tl-note:hover{opacity:1;filter:brightness(1.3)}
.tl-note.synth{background:var(--cyan);box-shadow:0 0 4px var(--cg)}
.tl-note.drum{background:var(--orange);box-shadow:0 0 4px var(--og);border-radius:2px}
.tl-playhead{position:absolute;top:0;width:2px;background:var(--red);z-index:3;pointer-events:none;
  box-shadow:0 0 8px var(--rg)}
.tl-bar-num{position:absolute;top:-16px;font-family:'Orbitron',sans-serif;font-size:.45rem;color:var(--dim)}
.tl-top{height:16px;background:var(--sf);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:1}

/* Mode Toggle */
.mode-toggle{display:flex;justify-content:center;gap:0;margin-bottom:10px}
.mode-btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:.7rem;padding:10px 30px;
  border:2px solid var(--brd);background:var(--sf);color:var(--dim);cursor:pointer;transition:all .12s;letter-spacing:.1em}
.mode-btn:first-child{border-radius:8px 0 0 8px}
.mode-btn:last-child{border-radius:0 8px 8px 0}
.mode-btn.on{color:var(--bg);font-weight:900}
.mode-btn.synth-on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 16px var(--cg)}
.mode-btn.drum-on{background:var(--orange);border-color:var(--orange);box-shadow:0 0 16px var(--og)}

/* Piano Keyboard */
.keyboard-wrap{background:var(--sf);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px;overflow-x:auto}
.keyboard{position:relative;display:flex;margin:0 auto;width:fit-content;height:140px;user-select:none}
.key{position:relative;cursor:pointer;transition:all .06s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;
  font-family:'Orbitron',sans-serif;font-weight:700}
.key.white{width:44px;height:140px;background:linear-gradient(180deg,#d8d8e8,#f0f0f8);
  border:1px solid #aaa;border-radius:0 0 6px 6px;z-index:1;margin-right:-1px;color:#666;font-size:.5rem}
.key.white:active,.key.white.pressed{background:linear-gradient(180deg,#b8b8cc,#d0d0dc);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.2),0 0 12px var(--cg)}
.key.black{width:28px;height:90px;background:linear-gradient(180deg,#0a0a18,#1a1a30);
  border:1px solid #222;border-radius:0 0 4px 4px;z-index:2;margin-left:-14px;margin-right:-14px;
  color:transparent;font-size:0;box-shadow:0 3px 6px rgba(0,0,0,.5)}
.key.black:active,.key.black.pressed{background:linear-gradient(180deg,#1a1a30,#2a2a44);
  box-shadow:0 1px 3px rgba(0,0,0,.3),0 0 12px var(--ppg)}

/* Drum Pads */
.pads-wrap{background:var(--sf);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px}
.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:500px;margin:0 auto}
.pad{aspect-ratio:1.4;border-radius:10px;border:2px solid var(--brd);background:var(--sf2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:.65rem;color:var(--orange);
  transition:all .06s;user-select:none;letter-spacing:.05em}
.pad:active,.pad.pressed{background:var(--orange);color:var(--bg);border-color:var(--orange);
  box-shadow:0 0 20px var(--og);transform:scale(.95)}

/* Synth Controls */
.synth-controls{display:flex;flex-wrap:wrap;gap:10px;padding:10px 14px;background:var(--sf);
  border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;align-items:flex-end}

/* Visualizer */
.vis-wrap{background:var(--sf);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:10px}
.vis{height:60px}
canvas{width:100%;height:100%;display:block}

/* Hidden */
.hidden{display:none!important}

footer{text-align:center;padding:8px 0;font-size:.5rem;color:var(--dim)}

@media(max-width:768px){
  header h1{font-size:1.3rem}
  .keyboard-wrap{padding:8px}
  .key.white{width:34px;height:110px}
  .key.black{width:22px;height:70px;margin-left:-11px;margin-right:-11px}
  .timeline{height:220px}
  input[type=range]{width:60px}
}
</style>
</head>
<body>
<div class="app">
<header><h1>MIDI SYNTHI</h1></header>

<div class="transport">
  <div class="tg"><label>Transport</label>
    <div class="tg-row">
      <button class="btn" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
      <button class="btn" id="stopBtn" onclick="stop()">&#9632; Stop</button>
      <button class="btn" id="recBtn" onclick="toggleRec()">&#9679; Rec</button>
      <button class="btn" id="loopBtn" onclick="toggleLoop()">&#8634; Loop</button>
    </div>
  </div>
  <div class="sep"></div>
  <div class="tg"><label>BPM</label>
    <input type="range" id="bpm" min="40" max="240" value="120" oninput="$('#bpmV').textContent=this.value">
    <span class="rv" id="bpmV">120</span>
  </div>
  <div class="tg"><label>Bars</label>
    <select id="bars" onchange="setBars(+this.value)">
      <option value="2">2</option>
      <option value="4" selected>4</option>
      <option value="8">8</option>
      <option value="16">16</option>
    </select>
  </div>
  <div class="tg"><label>Quantize</label>
    <select id="quantize">
      <option value="0">Off</option>
      <option value="4">1/4</option>
      <option value="8">1/8</option>
      <option value="16" selected>1/16</option>
      <option value="32">1/32</option>
    </select>
  </div>
  <div class="sep"></div>
  <div class="tg"><label>Volume</label>
    <input type="range" id="vol" min="0" max="100" value="75" oninput="setVol(this.value)">
    <span class="rv" id="volV">75%</span>
  </div>
  <div class="sep"></div>
  <div class="tg"><label>&nbsp;</label>
    <button class="btn" onclick="clearTimeline()" style="border-color:var(--pink)">Clear</button>
  </div>
</div>

<!-- Timeline -->
<div class="timeline-wrap">
  <div class="timeline">
    <div class="tl-labels" id="tlLabels"></div>
    <div class="tl-scroll" id="tlScroll">
      <div class="tl-grid" id="tlGrid"></div>
    </div>
  </div>
</div>

<!-- Mode Toggle -->
<div class="mode-toggle">
  <button class="mode-btn synth-on on" id="synthModeBtn" onclick="setMode('synth')">SYNTH</button>
  <button class="mode-btn" id="drumModeBtn" onclick="setMode('drums')">DRUMS</button>
</div>

<!-- Piano Keyboard -->
<div class="keyboard-wrap" id="keyboardWrap">
  <div class="keyboard" id="keyboard"></div>
</div>

<!-- Drum Pads -->
<div class="pads-wrap hidden" id="padsWrap">
  <div class="pads" id="pads"></div>
</div>

<!-- Synth Controls -->
<div class="synth-controls" id="synthControls">
  <div class="tg"><label>Wave</label>
    <select id="wave">
      <option value="sawtooth">Saw</option>
      <option value="square">Square</option>
      <option value="sine">Sine</option>
      <option value="triangle">Tri</option>
    </select>
  </div>
  <div class="tg"><label>Filter</label>
    <input type="range" id="flt" min="100" max="8000" value="3000" oninput="$('#fltV').textContent=this.value">
    <span class="rv" id="fltV">3000</span>
  </div>
  <div class="tg"><label>Reso</label>
    <input type="range" id="fltQ" min="0" max="20" value="1" step=".5" oninput="$('#fltQV').textContent=(+this.value).toFixed(1)">
    <span class="rv" id="fltQV">1.0</span>
  </div>
  <div class="tg"><label>Atk</label>
    <input type="range" id="atk" min="0" max="500" value="5" oninput="$('#atkV').textContent=this.value">
    <span class="rv" id="atkV">5</span>
  </div>
  <div class="tg"><label>Dec</label>
    <input type="range" id="dec" min="10" max="1000" value="150" oninput="$('#decV').textContent=this.value">
    <span class="rv" id="decV">150</span>
  </div>
  <div class="tg"><label>Sus</label>
    <input type="range" id="sus" min="0" max="100" value="40" oninput="$('#susV').textContent=this.value+'%'">
    <span class="rv" id="susV">40%</span>
  </div>
  <div class="tg"><label>Rel</label>
    <input type="range" id="rel" min="10" max="2000" value="200" oninput="$('#relV').textContent=this.value">
    <span class="rv" id="relV">200</span>
  </div>
  <div class="tg"><label>Delay</label>
    <input type="range" id="dly" min="0" max="80" value="0" oninput="$('#dlyV').textContent=this.value+'%';if(dlyGain)dlyGain.gain.value=this.value/100">
    <span class="rv" id="dlyV">0%</span>
  </div>
  <div class="sep"></div>
  <div class="tg"><label>Preset</label>
    <select id="preset" onchange="applyPreset(this.value);this.value=''">
      <option value="">--</option>
      <option value="lead">Lead</option>
      <option value="bass">Bass</option>
      <option value="pad">Pad</option>
      <option value="pluck">Pluck</option>
      <option value="acid">Acid</option>
      <option value="sub">Sub</option>
    </select>
  </div>
</div>

<div class="vis-wrap"><div class="vis"><canvas id="visCanvas"></canvas></div></div>
<footer>MIDI SYNTHI &mdash; Tap &bull; Record &bull; Play</footer>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let noteId = 0;

// ── Notes & Drums ──
const KEYS = [];
const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
for (let oct = 3; oct <= 4; oct++) {
  for (let i = 0; i < 12; i++) {
    const name = noteNames[i] + oct;
    const freq = 440 * Math.pow(2, (oct - 4) * 12 + i - 9) / Math.pow(2, 0);
    const midi = (oct + 1) * 12 + i;
    const realFreq = 440 * Math.pow(2, (midi - 69) / 12);
    KEYS.push({ name, freq: realFreq, black: noteNames[i].includes('#'), midi });
  }
}
KEYS.push({ name: 'C5', freq: 523.25, black: false, midi: 72 });

const DRUMS = [
  { name: 'Kick', key: 'kick' },
  { name: 'Snare', key: 'snare' },
  { name: 'Cl HH', key: 'chh' },
  { name: 'Op HH', key: 'ohh' },
  { name: 'Clap', key: 'clap' },
  { name: 'Tom L', key: 'tomL' },
  { name: 'Tom H', key: 'tomH' },
  { name: 'Rim', key: 'rim' },
];

const PRESETS = {
  lead:{wave:'square',flt:4000,q:2,atk:5,dec:100,sus:60,rel:200,dly:30},
  bass:{wave:'sawtooth',flt:800,q:4,atk:5,dec:150,sus:40,rel:100,dly:0},
  pad:{wave:'sawtooth',flt:2000,q:1,atk:400,dec:500,sus:70,rel:1500,dly:40},
  pluck:{wave:'triangle',flt:5000,q:3,atk:2,dec:80,sus:0,rel:150,dly:20},
  acid:{wave:'sawtooth',flt:600,q:18,atk:2,dec:120,sus:0,rel:50,dly:10},
  sub:{wave:'sine',flt:400,q:0,atk:10,dec:300,sus:60,rel:200,dly:0},
};

// ── Lane Mapping ──
// Lanes: synth notes (high to low) then drums
const lanes = [];
for (let i = KEYS.length - 1; i >= 0; i--) lanes.push({ type: 'synth', key: KEYS[i] });
DRUMS.forEach(d => lanes.push({ type: 'drum', drum: d }));

function laneForSynth(midi) { return lanes.findIndex(l => l.type === 'synth' && l.key.midi === midi); }
function laneForDrum(key) { return lanes.findIndex(l => l.type === 'drum' && l.drum.key === key); }

// ── State ──
let audioCtx, masterGain, comp, analyser, dlyNode, dlyGain, dlyFb, noiseBuf;
let mode = 'synth';
let recording = false, playing = false, looping = true;
let totalBars = 4;
let recordedNotes = [];
let activeKeys = {};
let playStartTime = 0, playOffset = 0;
let animFrame;
const PX_PER_BEAT = 50;

// ── Audio Init ──
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.ratio.value = 6;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.75;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  dlyNode = audioCtx.createDelay(1);
  dlyNode.delayTime.value = 0.33;
  dlyGain = audioCtx.createGain();
  dlyGain.gain.value = 0;
  dlyFb = audioCtx.createGain();
  dlyFb.gain.value = 0.35;
  masterGain.connect(comp);
  masterGain.connect(dlyNode);
  dlyNode.connect(dlyGain); dlyNode.connect(dlyFb); dlyFb.connect(dlyNode);
  dlyGain.connect(comp);
  comp.connect(analyser);
  analyser.connect(audioCtx.destination);
  const len = audioCtx.sampleRate * 2;
  noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
}

// ── Synth Sound ──
function playSynthSound(freq, t) {
  if (!audioCtx) return;
  const now = t || audioCtx.currentTime;
  const w = $('#wave').value;
  const cf = +$('#flt').value, q = +$('#fltQ').value;
  const a = +$('#atk').value/1000, dc = +$('#dec').value/1000;
  const s = +$('#sus').value/100, r = +$('#rel').value/1000;
  const o1 = audioCtx.createOscillator(); o1.type = w; o1.frequency.setValueAtTime(freq, now);
  const o2 = audioCtx.createOscillator(); o2.type = w; o2.frequency.setValueAtTime(freq*1.004, now);
  const mix = audioCtx.createGain(); mix.gain.value = 0.35;
  const flt = audioCtx.createBiquadFilter(); flt.type = 'lowpass';
  flt.frequency.setValueAtTime(Math.min(cf, 120), now);
  flt.frequency.linearRampToValueAtTime(cf, now+a);
  flt.frequency.linearRampToValueAtTime(cf*0.3+100, now+a+dc);
  flt.Q.value = q;
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.3, now+a);
  env.gain.linearRampToValueAtTime(0.3*s, now+a+dc);
  env.gain.linearRampToValueAtTime(0, now+a+dc+r);
  o1.connect(mix); o2.connect(mix);
  mix.connect(flt); flt.connect(env); env.connect(masterGain);
  const end = now+a+dc+r+0.05;
  o1.start(now); o2.start(now); o1.stop(end); o2.stop(end);
}

// ── Drum Sounds ──
function playDrumSound(key, t) {
  if (!audioCtx) return;
  const now = t || audioCtx.currentTime;
  const v = 0.8;
  switch(key) {
    case 'kick': {
      const o = audioCtx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(150,now); o.frequency.exponentialRampToValueAtTime(30,now+.12);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(.001,now+.4);
      o.connect(g); g.connect(masterGain); o.start(now); o.stop(now+.45);
      const c = audioCtx.createBufferSource(); c.buffer=noiseBuf;
      const cf = audioCtx.createBiquadFilter(); cf.type='highpass'; cf.frequency.value=800;
      const cg = audioCtx.createGain(); cg.gain.setValueAtTime(v*.5,now); cg.gain.exponentialRampToValueAtTime(.001,now+.02);
      c.connect(cf); cf.connect(cg); cg.connect(masterGain); c.start(now); c.stop(now+.03);
      break;
    }
    case 'snare': {
      const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.value=200;
      const og = audioCtx.createGain(); og.gain.setValueAtTime(v*.5,now); og.gain.exponentialRampToValueAtTime(.001,now+.12);
      o.connect(og); og.connect(masterGain); o.start(now); o.stop(now+.15);
      const n = audioCtx.createBufferSource(); n.buffer=noiseBuf;
      const nf = audioCtx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=3000; nf.Q.value=1;
      const ng = audioCtx.createGain(); ng.gain.setValueAtTime(v*.6,now); ng.gain.exponentialRampToValueAtTime(.001,now+.15);
      n.connect(nf); nf.connect(ng); ng.connect(masterGain); n.start(now); n.stop(now+.2);
      break;
    }
    case 'chh': {
      [800,1050,1300,1550,1850,2150].forEach(f=>{
        const o=audioCtx.createOscillator();o.type='square';o.frequency.value=f;
        const g=audioCtx.createGain();g.gain.setValueAtTime(v*.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.06);
        const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;
        o.connect(hp);hp.connect(g);g.connect(masterGain);o.start(now);o.stop(now+.08);
      }); break;
    }
    case 'ohh': {
      [800,1050,1300,1550,1850,2150].forEach(f=>{
        const o=audioCtx.createOscillator();o.type='square';o.frequency.value=f;
        const g=audioCtx.createGain();g.gain.setValueAtTime(v*.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);
        const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;
        o.connect(hp);hp.connect(g);g.connect(masterGain);o.start(now);o.stop(now+.35);
      }); break;
    }
    case 'clap': {
      for(let i=0;i<3;i++){const n=audioCtx.createBufferSource();n.buffer=noiseBuf;
        const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=1500;f.Q.value=.8;
        const g=audioCtx.createGain();const off=i*.015;
        g.gain.setValueAtTime(0,now+off);g.gain.linearRampToValueAtTime(v*.5,now+off+.003);
        g.gain.exponentialRampToValueAtTime(.001,now+off+.04);
        n.connect(f);f.connect(g);g.connect(masterGain);n.start(now+off);n.stop(now+off+.05);}
      const tl=audioCtx.createBufferSource();tl.buffer=noiseBuf;
      const tf=audioCtx.createBiquadFilter();tf.type='bandpass';tf.frequency.value=1500;
      const tg=audioCtx.createGain();tg.gain.setValueAtTime(v*.4,now+.045);tg.gain.exponentialRampToValueAtTime(.001,now+.2);
      tl.connect(tf);tf.connect(tg);tg.connect(masterGain);tl.start(now+.045);tl.stop(now+.25);
      break;
    }
    case 'tomL': {
      const o=audioCtx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(120,now);o.frequency.exponentialRampToValueAtTime(60,now+.15);
      const g=audioCtx.createGain();g.gain.setValueAtTime(v*.7,now);g.gain.exponentialRampToValueAtTime(.001,now+.35);
      o.connect(g);g.connect(masterGain);o.start(now);o.stop(now+.4); break;
    }
    case 'tomH': {
      const o=audioCtx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(100,now+.1);
      const g=audioCtx.createGain();g.gain.setValueAtTime(v*.7,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
      o.connect(g);g.connect(masterGain);o.start(now);o.stop(now+.3); break;
    }
    case 'rim': {
      const o=audioCtx.createOscillator();o.type='triangle';o.frequency.value=820;
      const g=audioCtx.createGain();g.gain.setValueAtTime(v*.5,now);g.gain.exponentialRampToValueAtTime(.001,now+.04);
      o.connect(g);g.connect(masterGain);o.start(now);o.stop(now+.05);
      const n=audioCtx.createBufferSource();n.buffer=noiseBuf;
      const nf=audioCtx.createBiquadFilter();nf.type='highpass';nf.frequency.value=4000;
      const ng=audioCtx.createGain();ng.gain.setValueAtTime(v*.4,now);ng.gain.exponentialRampToValueAtTime(.001,now+.02);
      n.connect(nf);nf.connect(ng);ng.connect(masterGain);n.start(now);n.stop(now+.03); break;
    }
  }
}

// ── Timeline Helpers ──
function totalBeats() { return totalBars * 4; }
function totalSeconds() { return totalBeats() * 60 / (+$('#bpm').value); }
function gridWidth() { return totalBeats() * PX_PER_BEAT; }
function timeToPx(t) { return (t / totalSeconds()) * gridWidth(); }
function pxToTime(px) { return (px / gridWidth()) * totalSeconds(); }

function quantizeTime(t) {
  const q = +$('#quantize').value;
  if (!q) return t;
  const beatLen = 60 / (+$('#bpm').value);
  const grid = beatLen / (q / 4);
  return Math.round(t / grid) * grid;
}

// ── Note Recording ──
function recordNote(type, data) {
  if (!recording || !playing) return;
  const elapsed = audioCtx.currentTime - playStartTime + playOffset;
  const total = totalSeconds();
  let t = elapsed % total;
  t = quantizeTime(t);

  if (type === 'synth') {
    const lane = laneForSynth(data.midi);
    const dur = Math.max(0.05, +$('#dec').value/1000 + +$('#rel').value/1000);
    recordedNotes.push({ id: noteId++, time: t, duration: Math.min(dur, 0.5), lane, type: 'synth', midi: data.midi, freq: data.freq });
  } else {
    const lane = laneForDrum(data.key);
    recordedNotes.push({ id: noteId++, time: t, duration: 0.1, lane, type: 'drum', drumKey: data.key });
  }
  renderNotes();
}

// ── Playback ──
function togglePlay() {
  if (playing) { stop(); return; }
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  playing = true;
  playStartTime = audioCtx.currentTime;
  playOffset = 0;
  $('#playBtn').classList.add('on');
  schedulePlayback();
  animatePlayhead();
}

function stop() {
  playing = false;
  recording = false;
  cancelAnimationFrame(animFrame);
  $('#playBtn').classList.remove('on');
  $('#recBtn').classList.remove('rec-on');
  updatePlayhead(-1);
}

function toggleRec() {
  initAudio();
  recording = !recording;
  $('#recBtn').classList.toggle('rec-on', recording);
  if (recording && !playing) togglePlay();
}

function toggleLoop() {
  looping = !looping;
  $('#loopBtn').classList.toggle('on', looping);
}

let scheduledUntil = 0;
let scheduledIds = new Set();

function schedulePlayback() {
  if (!playing) return;
  const now = audioCtx.currentTime;
  const elapsed = now - playStartTime + playOffset;
  const total = totalSeconds();
  const ahead = 0.1;

  const currentTime = looping ? elapsed % total : elapsed;
  const futureTime = currentTime + ahead;

  if (!looping && currentTime > total) { stop(); return; }

  recordedNotes.forEach(n => {
    const noteTime = n.time;
    let schedTime;

    if (looping) {
      const currentLoop = Math.floor(elapsed / total);
      schedTime = currentLoop * total + noteTime;
      if (schedTime < elapsed) schedTime += total;
    } else {
      schedTime = noteTime;
    }

    const absTime = playStartTime - playOffset + schedTime;
    const uid = n.id + '_' + Math.floor(schedTime / total);

    if (absTime >= now && absTime < now + ahead && !scheduledIds.has(uid)) {
      scheduledIds.add(uid);
      if (n.type === 'synth') playSynthSound(n.freq, absTime);
      else playDrumSound(n.drumKey, absTime);
      setTimeout(() => scheduledIds.delete(uid), 500);
    }
  });

  setTimeout(schedulePlayback, 20);
}

function animatePlayhead() {
  if (!playing) return;
  const elapsed = audioCtx.currentTime - playStartTime + playOffset;
  const total = totalSeconds();
  const t = looping ? elapsed % total : Math.min(elapsed, total);
  updatePlayhead(t);

  if (!looping && elapsed >= total) { stop(); return; }
  animFrame = requestAnimationFrame(animatePlayhead);
}

function updatePlayhead(t) {
  const ph = $('#tlPlayhead');
  if (!ph) return;
  if (t < 0) { ph.style.display = 'none'; return; }
  ph.style.display = 'block';
  const px = timeToPx(t);
  ph.style.left = px + 'px';

  const scroll = $('#tlScroll');
  const visible = scroll.clientWidth;
  if (px > scroll.scrollLeft + visible - 40 || px < scroll.scrollLeft) {
    scroll.scrollLeft = px - 60;
  }
}

// ── Build Timeline ──
function buildTimeline() {
  const labels = $('#tlLabels');
  const grid = $('#tlGrid');
  labels.innerHTML = '';
  grid.innerHTML = '';

  const laneH = 14;
  const totalH = lanes.length * laneH;
  const w = gridWidth();
  grid.style.width = w + 'px';
  grid.style.height = (totalH + 20) + 'px';

  // Beat grid lines (CSS background on grid)
  const beatW = PX_PER_BEAT;
  const barW = beatW * 4;
  grid.style.backgroundImage =
    `repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0px, rgba(255,255,255,.08) 1px, transparent 1px, transparent ${barW}px),` +
    `repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent ${beatW}px),` +
    `repeating-linear-gradient(180deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent ${laneH}px)`;
  grid.style.backgroundPositionY = '16px';

  // Bar numbers
  for (let b = 0; b < totalBars; b++) {
    const num = document.createElement('div');
    num.className = 'tl-bar-num';
    num.style.left = (b * barW + 4) + 'px';
    num.style.top = '2px';
    num.textContent = (b + 1);
    grid.appendChild(num);
  }

  // Labels
  let drumStart = false;
  lanes.forEach((l, i) => {
    const lbl = document.createElement('div');
    lbl.className = 'tl-label';
    if (l.type === 'drum') {
      if (!drumStart) { lbl.classList.add('section-sep'); drumStart = true; }
      lbl.classList.add('drum-label');
      lbl.textContent = l.drum.name;
    } else {
      lbl.textContent = l.key.name;
      if (!l.key.black) lbl.classList.add('white-key');
    }
    labels.appendChild(lbl);
  });

  // Playhead
  const ph = document.createElement('div');
  ph.className = 'tl-playhead';
  ph.id = 'tlPlayhead';
  ph.style.height = totalH + 'px';
  ph.style.top = '16px';
  ph.style.display = 'none';
  grid.appendChild(ph);

  // Sync vertical scroll
  $('#tlScroll').onscroll = () => { labels.scrollTop = $('#tlScroll').scrollTop; };

  renderNotes();
}

function renderNotes() {
  $$('.tl-note').forEach(n => n.remove());
  const grid = $('#tlGrid');
  const laneH = 14;

  recordedNotes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'tl-note ' + n.type;
    el.style.left = timeToPx(n.time) + 'px';
    el.style.top = (16 + n.lane * laneH + 1) + 'px';
    el.style.width = Math.max(4, timeToPx(n.duration)) + 'px';
    el.onclick = () => {
      recordedNotes = recordedNotes.filter(x => x.id !== n.id);
      renderNotes();
    };
    grid.appendChild(el);
  });
}

function clearTimeline() { recordedNotes = []; renderNotes(); }
function setBars(n) { totalBars = n; buildTimeline(); }

// ── Build Keyboard ──
function buildKeyboard() {
  const kb = $('#keyboard');
  kb.innerHTML = '';
  KEYS.forEach(k => {
    const key = document.createElement('div');
    key.className = 'key ' + (k.black ? 'black' : 'white');
    if (!k.black) key.textContent = k.name.replace(/\d/, '');
    key.dataset.midi = k.midi;
    key.dataset.freq = k.freq;
    key.dataset.name = k.name;

    const down = (e) => {
      e.preventDefault();
      initAudio();
      key.classList.add('pressed');
      playSynthSound(k.freq);
      recordNote('synth', k);
    };
    const up = () => { key.classList.remove('pressed'); };

    key.addEventListener('mousedown', down);
    key.addEventListener('mouseup', up);
    key.addEventListener('mouseleave', up);
    key.addEventListener('touchstart', down, { passive: false });
    key.addEventListener('touchend', up);
    kb.appendChild(key);
  });
}

// ── Build Drum Pads ──
function buildPads() {
  const pads = $('#pads');
  pads.innerHTML = '';
  DRUMS.forEach(d => {
    const pad = document.createElement('div');
    pad.className = 'pad';
    pad.textContent = d.name;
    pad.dataset.key = d.key;

    const down = (e) => {
      e.preventDefault();
      initAudio();
      pad.classList.add('pressed');
      playDrumSound(d.key);
      recordNote('drum', d);
      setTimeout(() => pad.classList.remove('pressed'), 120);
    };

    pad.addEventListener('mousedown', down);
    pad.addEventListener('touchstart', down, { passive: false });
    pads.appendChild(pad);
  });
}

// ── Mode Toggle ──
function setMode(m) {
  mode = m;
  $('#synthModeBtn').className = 'mode-btn' + (m === 'synth' ? ' synth-on on' : '');
  $('#drumModeBtn').className = 'mode-btn' + (m === 'drums' ? ' drum-on on' : '');
  $('#keyboardWrap').classList.toggle('hidden', m !== 'synth');
  $('#padsWrap').classList.toggle('hidden', m !== 'drums');
  $('#synthControls').classList.toggle('hidden', m !== 'synth');
}

// ── Volume ──
function setVol(v) {
  $('#volV').textContent = v + '%';
  if (masterGain) masterGain.gain.value = v / 100;
}

// ── Presets ──
function applyPreset(name) {
  const p = PRESETS[name]; if (!p) return;
  $('#wave').value = p.wave; $('#flt').value = p.flt; $('#fltQ').value = p.q;
  $('#atk').value = p.atk; $('#dec').value = p.dec; $('#sus').value = p.sus;
  $('#rel').value = p.rel; $('#dly').value = p.dly;
  $('#fltV').textContent = p.flt; $('#fltQV').textContent = p.q.toFixed(1);
  $('#atkV').textContent = p.atk; $('#decV').textContent = p.dec;
  $('#susV').textContent = p.sus + '%'; $('#relV').textContent = p.rel;
  $('#dlyV').textContent = p.dly + '%';
  if (dlyGain) dlyGain.gain.value = p.dly / 100;
}

// ── Computer Keyboard Mapping ──
const KEY_MAP_SYNTH = {
  'KeyZ':0,'KeyS':1,'KeyX':2,'KeyD':3,'KeyC':4,'KeyV':5,'KeyG':6,'KeyB':7,'KeyH':8,'KeyN':9,'KeyJ':10,'KeyM':11,
  'KeyQ':12,'Digit2':13,'KeyW':14,'Digit3':15,'KeyE':16,'KeyR':17,'Digit5':18,'KeyT':19,'Digit6':20,'KeyY':21,'Digit7':22,'KeyU':23,'KeyI':24
};
const KEY_MAP_DRUMS = {
  'Digit1':0,'Digit2':1,'Digit3':2,'Digit4':3,'KeyQ':4,'KeyW':5,'KeyE':6,'KeyR':7
};
const keysDown = new Set();

document.addEventListener('keydown', e => {
  if (e.repeat || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); playing ? stop() : togglePlay(); return; }

  if (keysDown.has(e.code)) return;
  keysDown.add(e.code);
  initAudio();

  if (mode === 'synth' && KEY_MAP_SYNTH[e.code] !== undefined) {
    const idx = KEY_MAP_SYNTH[e.code];
    if (idx < KEYS.length) {
      const k = KEYS[idx];
      playSynthSound(k.freq);
      recordNote('synth', k);
      const el = $$(`.key[data-midi="${k.midi}"]`)[0];
      if (el) el.classList.add('pressed');
    }
  } else if (mode === 'drums' && KEY_MAP_DRUMS[e.code] !== undefined) {
    const idx = KEY_MAP_DRUMS[e.code];
    if (idx < DRUMS.length) {
      playDrumSound(DRUMS[idx].key);
      recordNote('drum', DRUMS[idx]);
      const el = $$('.pad')[idx];
      if (el) { el.classList.add('pressed'); setTimeout(() => el.classList.remove('pressed'), 120); }
    }
  }
});

document.addEventListener('keyup', e => {
  keysDown.delete(e.code);
  if (mode === 'synth' && KEY_MAP_SYNTH[e.code] !== undefined) {
    const idx = KEY_MAP_SYNTH[e.code];
    if (idx < KEYS.length) {
      const el = $$(`.key[data-midi="${KEYS[idx].midi}"]`)[0];
      if (el) el.classList.remove('pressed');
    }
  }
});

// ── Visualizer ──
function initVis() {
  const c = $('#visCanvas');
  const cx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  function resize() { c.width = c.offsetWidth * dpr; c.height = c.offsetHeight * dpr; cx.setTransform(dpr,0,0,dpr,0,0); }
  resize(); window.addEventListener('resize', resize);
  function draw() {
    requestAnimationFrame(draw);
    const W = c.offsetWidth, H = c.offsetHeight;
    cx.fillStyle = 'rgba(8,8,15,.4)'; cx.fillRect(0,0,W,H);
    if (!analyser) return;
    const buf = analyser.frequencyBinCount;
    const data = new Uint8Array(buf);
    analyser.getByteTimeDomainData(data);
    cx.lineWidth = 1.5; cx.strokeStyle = '#00e5ff'; cx.shadowBlur = 5; cx.shadowColor = '#00e5ff';
    cx.beginPath();
    const sl = W / buf; let x = 0;
    for (let i = 0; i < buf; i++) { const y = (data[i]/128)*H/2; i===0?cx.moveTo(x,y):cx.lineTo(x,y); x+=sl; }
    cx.lineTo(W, H/2); cx.stroke(); cx.shadowBlur = 0;
  }
  draw();
}

// ── Init ──
buildKeyboard();
buildPads();
buildTimeline();
initVis();
$('#loopBtn').classList.add('on');
</script>
